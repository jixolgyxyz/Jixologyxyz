name: auth-templates-cd

on:
  push:
    branches:
      - staging
      - main
    paths:
      - "supabase/templates/**"
      - "supabase/config.toml"
      - ".github/workflows/auth-templates-cd.yml"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: auth-templates-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-auth-templates:
    runs-on: ubuntu-latest
    if: ${{ (github.ref == 'refs/heads/staging' && vars.ENABLE_AUTH_TEMPLATES_STAGING_DEPLOY == 'true') ||
      (github.ref == 'refs/heads/main' && vars.ENABLE_AUTH_TEMPLATES_PROD_DEPLOY == 'true')}}
    environment: ${{ github.ref == 'refs/heads/main' && 'Jixology' || 'staging' }}

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.79.0

      - name: Validate deployment configuration
        shell: bash
        run: |
          set -euo pipefail

          : "${SUPABASE_ACCESS_TOKEN:?Missing SUPABASE_ACCESS_TOKEN secret}"
          : "${SUPABASE_PROJECT_ID:?Missing SUPABASE_PROJECT_ID secret}"

          if [[ ! -f supabase/config.toml ]]; then
            echo "::error file=supabase/config.toml::Configuration file not found"
            exit 1
          fi

          if [[ ! -d supabase/templates ]]; then
            echo "::error file=supabase/templates::Templates directory not found"
            exit 1
          fi

      - name: Validate template files
        shell: bash
        run: |
          set -euo pipefail

          templates=()

          while IFS= read -r -d '' template; do
            templates+=("$template")
          done < <(
            find supabase/templates \
              -type f \
              -name "*.html" \
              -print0
          )

          if (( ${#templates[@]} == 0 )); then
            echo "::error file=supabase/templates::No HTML templates found"
            exit 1
          fi

          for template in "${templates[@]}"; do
            if [[ ! -s "$template" ]]; then
              echo "::error file=$template::Template is empty"
              exit 1
            fi

            echo "Validated: $template"
          done

      - name: Deploy Supabase Auth configuration
        shell: bash
        run: |
          set -euo pipefail

          supabase config push \
            --project-ref "$SUPABASE_PROJECT_ID" \
            --yes
